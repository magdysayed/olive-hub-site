<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olive Trade — B2B Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- ✅ FIX 1: Supabase SDK loaded FIRST in <head> so it is available when app.js runs -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">🫒</span>
        <div>
          <h1 class="brand-name">Olive Trade</h1>
          <p class="brand-sub">B2B Intelligence Dashboard</p>
        </div>
      </div>
      <div class="header-meta">
        <span class="live-badge" id="liveBadge">
          <span class="live-dot"></span> LIVE
        </span>
        <!-- ✅ FIX 4: Manual Refresh button in the header -->
        <button class="refresh-btn" id="refreshBtn" title="Refresh data">↻ Refresh</button>
        <span class="last-updated" id="lastUpdated">Connecting…</span>
      </div>
    </div>
  </header>

  <!-- ── NAVIGATION TABS ── -->
  <nav class="tab-nav">
    <div class="tab-nav-inner">
      <!-- ✅ FIX 2: Each tab button has a proper id AND data-tab attribute -->
      <button class="tab-btn active" id="tab-sellers" data-tab="sellers">
        <span class="tab-icon">🧑‍🌾</span>
        <span class="tab-label">Sellers Radar</span>
        <span class="tab-count" id="count-sellers">0</span>
      </button>
      <button class="tab-btn" id="tab-factories" data-tab="factories">
        <span class="tab-icon">🏭</span>
        <span class="tab-label">Factory Orders</span>
        <span class="tab-count" id="count-factories">0</span>
      </button>
      <button class="tab-btn" id="tab-stores" data-tab="stores">
        <span class="tab-icon">🏪</span>
        <span class="tab-label">Warehouse Storage</span>
        <span class="tab-count" id="count-stores">0</span>
      </button>
    </div>
  </nav>

  <!-- ── MAIN CONTENT ── -->
  <main class="main-content">

    <!-- Sellers Panel -->
    <section class="tab-panel active" id="panel-sellers">
      <div class="panel-header">
        <h2>Sellers Radar</h2>
        <p>Active olive suppliers ready to trade</p>
      </div>
      <div class="cards-grid" id="grid-sellers">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>

    <!-- Factories Panel -->
    <section class="tab-panel" id="panel-factories">
      <div class="panel-header">
        <h2>Factory Orders</h2>
        <p>Open procurement requests from olive processors</p>
      </div>
      <div class="cards-grid" id="grid-factories">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>

    <!-- Stores Panel -->
    <section class="tab-panel" id="panel-stores">
      <div class="panel-header">
        <h2>Warehouse Storage</h2>
        <p>Available cold-storage and warehouse capacity</p>
      </div>
      <div class="cards-grid" id="grid-stores">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>

    <!-- Error Banner -->
    <div class="error-banner hidden" id="errorBanner">
      <span class="error-icon">⚠️</span>
      <span id="errorMsg">Connection error.</span>
      <button class="retry-btn" id="retryBtn">Retry</button>
    </div>

  </main>

  <!-- ✅ FIX 4: Modal moved directly into <body> at the top level so it is never hidden behind other elements -->
  <div class="modal-overlay hidden" id="modalOverlay" role="dialog" aria-modal="true">
    <div class="modal-box">
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- ✅ FIX 1: app.js is at the very end of <body> with defer so DOM is fully parsed first -->
  <script src="app.js" defer></script>
</body>
</html>
